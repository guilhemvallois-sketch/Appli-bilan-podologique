// ── Stockage de l'état des boutons de l'arbre clinique ──
function getCTD(treeId, testId){ return (S.clinicalTreeData[treeId]||{})[testId]||null; }
function setCTD(treeId, testId, val){
  if(!S.clinicalTreeData[treeId]) S.clinicalTreeData[treeId]={};
  if(S.clinicalTreeData[treeId][testId]===val) delete S.clinicalTreeData[treeId][testId];
  else S.clinicalTreeData[treeId][testId]=val;
  rerenderClinicalTree(treeId);
  // Refresh muscle recap
  const recap = document.getElementById('muscle-recap-content');
  if(recap) recap.innerHTML = renderMuscleRecapBlock();
}

function rerenderClinicalTree(treeId){
  // Try to update just the specific tree block if it exists
  const el = document.getElementById('ctree-'+treeId);
  if(el){
    const tree = CLINICAL_TREES.find(t=>t.id===treeId);
    if(tree) el.innerHTML = renderClinicalTreeInner(tree);
  } else {
    // Fallback: refresh whole container
    updateAllClinicalTrees();
  }
}

function renderClinicalTreeInner(tree){
  let h = '';
  h += `<div class="ctree-header" style="color:${tree.color};"><i class="ti ${tree.icon}"></i>${esc(tree.title)}</div>`;
  h += `<div style="font-size:12px;color:var(--text2);margin-bottom:10px;font-style:italic;">${esc(tree.intro)}</div>`;

  // Tests
  tree.tests.forEach(test=>{
    const cur = getCTD(tree.id, test.id);
    h += `<div class="ctree-test">
      <div class="ctree-test-name">${esc(test.name)}</div>
      <div class="ctree-test-desc">${esc(test.desc)}</div>
      <div class="ctree-btns">`;
    test.options.forEach(opt=>{
      const isSel = cur === opt.value;
      const cls = isSel ? (opt.style==='pos'?'selected-pos':'selected-neg') : '';
      const safeVal = opt.value.replace(/'/g,"\\'");
      const safeTreeId = tree.id.replace(/'/g,"\\'");
      const safeTestId = test.id.replace(/'/g,"\\'");
      h += `<button class="ctree-btn ${cls}" onclick="setCTD('${safeTreeId}','${safeTestId}','${safeVal}')">${esc(opt.label)}</button>`;
    });
    h += `</div></div>`;
  });

  // Analyse prédéterminée
  const treeData = S.clinicalTreeData[tree.id]||{};
  const allFilled = tree.tests.every(t => treeData[t.id]);
  if(allFilled){
    const match = tree.analyses.find(a=>{
      if(!a.conditions) return false;
      return Object.entries(a.conditions).every(([k,v])=>treeData[k]===v);
    });
    const result = match || tree.analyses.find(a=>a.conditions===null) || tree.analyses[tree.analyses.length-1];
    if(result){
      h += `<div class="ctree-analysis ${result.type}">
        <div class="ctree-label" style="margin-bottom:5px;">${esc(result.title)}</div>
        ${result.text ? `<div style="line-height:1.65;">${esc(result.text)}</div>` : ''}
      </div>`;
      // Show muscles if any
      if(result.muscles && result.muscles.length){
        h += `<div style="margin-top:8px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--orange);">
          <div style="font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;"><i class="ti ti-muscle"></i> Muscles impliqués</div>`;
        result.muscles.forEach(m=>{
          h += `<div style="font-size:12px;color:var(--text);padding:2px 0;">• ${esc(m)}</div>`;
        });
        h += `</div>`;
      }
    }
  } else {
    const filled = tree.tests.filter(t=>treeData[t.id]).length;
    h += `<div style="font-size:12px;color:var(--text3);text-align:center;padding:8px;border:.5px dashed var(--border2);border-radius:var(--radius-sm);margin-top:6px;">
      ${filled}/${tree.tests.length} test(s) renseigné(s) — Complétez pour l'analyse
    </div>`;
  }
  return h;
}

function renderClinicalTrees(examData){
  // Renvoie le HTML de tous les arbres actifs selon examData
  // Appelé après chaque field de l'examen statique
  let triggered = [];
  CLINICAL_TREES.forEach(tree=>{
    const active = isTreeActive(tree, examData);
    if(active) triggered.push(tree);
  });
  if(!triggered.length) return '';
  let h = `<div style="margin-top:14px;">`;
  triggered.forEach(tree=>{
    h += `<div class="ctree-trigger" id="ctree-${tree.id}">`;
    h += renderClinicalTreeInner(tree);
    h += `</div>`;
  });
  h += `</div>`;
  return h;
}

// ── RÉCAP MUSCULAIRE GLOBAL ──────────────────────────────────────
// Agrège tous les muscles identifiés par les arbres actifs + leurs résultats
function getMuscleRecap(){
  const muscles = [];
  CLINICAL_TREES.forEach(tree=>{
    if(!isTreeActive(tree, S.examData)) return;
    const treeData = S.clinicalTreeData[tree.id]||{};
    const allFilled = tree.tests.every(t=>treeData[t.id]);
    if(!allFilled) return;
    const match = tree.analyses.find(a=>{
      if(!a.conditions) return false;
      return Object.entries(a.conditions).every(([k,v])=>treeData[k]===v);
    });
    const result = match || tree.analyses.find(a=>a.conditions===null);
    if(result && result.muscles && result.muscles.length){
      result.muscles.forEach(m=>{
        if(!muscles.find(x=>x.muscle===m)){
          muscles.push({ muscle: m, source: tree.title, type: result.type });
        }
      });
    }
  });
  return muscles;
}

function renderMuscleRecapBlock(){
  const muscles = getMuscleRecap();
  if(!muscles.length) return `<div style="font-size:13px;color:var(--text3);font-style:italic;padding:10px 0;">Aucun trouble musculaire identifié par les arbres cliniques. Complétez les tests de chaque finding pour générer ce bilan.</div>`;
  const colorMap={descendant:'var(--orange)',ascendant:'#4F46E5',neutral:'var(--text2)',indeterminate:'var(--red)'};
  let h = `<div style="margin-bottom:6px;font-size:12px;color:var(--text2);">Synthèse des troubles musculaires identifiés via les arbres décisionnels. À compléter manuellement si nécessaire.</div>`;
  muscles.forEach(m=>{
    h += `<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);">
      <div style="min-width:8px;height:8px;border-radius:50%;background:${colorMap[m.type]||'var(--text2)'};margin-top:4px;flex-shrink:0;"></div>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text);">${esc(m.muscle)}</div>
        <div style="font-size:11px;color:var(--text3);">→ ${esc(m.source)}</div>
      </div>
    </div>`;
  });
  return h;
}

function updateAllClinicalTrees(){
  // Update each inline container that corresponds to a G/D pair or single field
  const treesByWatchField = {};
  CLINICAL_TREES.forEach(tree=>{
    [tree.watchField, tree.watchFieldAlt].filter(Boolean).forEach(fid=>{
      if(!treesByWatchField[fid]) treesByWatchField[fid]=[];
      treesByWatchField[fid].push(tree);
    });
  });

  // Find all inline containers
  document.querySelectorAll('[id^="ctree-pair-"],[id^="ctree-single-"]').forEach(container=>{
    const id = container.id;
    // Derive field id from container id
    let fieldId = id.replace('ctree-pair-','').replace('ctree-single-','');
    // For pairs, fieldId is the G field; also check D variant
    const trees = (treesByWatchField[fieldId]||[]).concat(
      // If this is a _g field, also get trees watching the same via _d
      treesByWatchField[fieldId.replace(/_g$/,'_d')]||[]
    );
    // Deduplicate
    const seen = new Set();
    const uniqueTrees = trees.filter(t=>{ if(seen.has(t.id))return false;seen.add(t.id);return true;});
    const activeTrees = uniqueTrees.filter(t=>isTreeActive(t, S.examData));

    if(activeTrees.length){
      container.innerHTML = activeTrees.map(tree=>
        `<div class="ctree-trigger" id="ctree-${tree.id}">${renderClinicalTreeInner(tree)}</div>`
      ).join('');
      container.style.marginBottom = '12px';
    } else {
      container.innerHTML = '';
      container.style.marginBottom = '';
    }
  });
}
